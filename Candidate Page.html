const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "lang": "fr",
  "width": "wide"
}/*EDITMODE-END*/;
const tweakState = { ...TWEAK_DEFAULS };

function setTheme(t) {
  tweakState.theme = t;
  document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "");
  document.querySelectorAll("#tweaks-panel .tweak-toggle button").forEach(b => {
    if (b.id === "t-light" || b.id === "t-dark") b.classList.toggle("active", b.id === "t-" + t);
  });
  window.parent.postMessage({ type: "__edit_mode_set_keys", edits: tweakState }, "*");
}
function setLang(l) {
  tweakState.lang = l;
  window.__setLang && window.__setLang(l);
  document.querySelectorAll("#tweaks-panel .tweak-toggle button").forEach(b => {
    if (b.id === "t-fr" || b.id === "t-en") b.classList.toggle("active", b.id === "t-" + l);
  });
  window.parent.postMessage({ type: "__edit_mode_set_keys", edits: tweakState }, "*");
}
function setWidth(w) {
  tweakState.width = w;
  document.documentElement.style.setProperty("--content-max", w === "narrow" ? "740px" : "920px");
  document.querySelectorAll("#tweaks-panel .tweak-toggle button").forEach(b => {
    if (b.id === "t-wide" || b.id === "t-narrow") b.classList.toggle("active", b.id === "t-" + w);
  });
  window.parent.postMessage({ type: "__edit_mode_set_keys", edits: tweakState }, "*");
}
window.addEventListener("message", (e) => {
  if (e.data && e.data.type === "__activate_edit_mode") document.getElementById("tweaks-panel").classList.add("open");
  if (e.data && e.data.type === "__deactivate_edit_mode") document.getElementById("tweaks-panel").classList.remove("open");
});
window.parent.postMessage({ type: "__edit_mode_available" }, "*");
setTheme(TWEAK_DEFAULS.theme);
</script>

function RadarChart({ axes, modelPositions, highlight, lang }) {
  const SIZE = 280, CX = 140, CY = 140, R = 108, N = axes.length;
  const angle = (i) => (Math.PI * 2 * i) / N - Math.PI / 2;
  const toXY = (i, val) => { const r = ((val + 5) / 10) * R; return [CX + r * Math.cos(angle(i)), CY + r * Math.sin(angle(i))]; };
  const polyPath = (vals) => vals.map((v, i) => { const [x,y] = toXY(i,v); return `${i===0?"M":"L"}${x.toFixed(1)},${y.toFixed(1)}`; }).join(" ") + " Z";
  const models = Object.keys(modelPositions);
  const agg = axes.map((_, i) => { const v = models.map(m => modelPositions[m][i]).sort((a,b)=>a-b); return v[Math.floor(v.length/2)]; });

  return (
    <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`} style={{ overflow:"visible" }}>
      {[0,0.25,0.5,0.75,1].map((t,ri) => (
        <polygon key={ri} points={axes.map((_,i) => { const r=t*R; return `${CX+r*Math.cos(angle(i))},${CY+r*Math.sin(angle(i))}`; }).join(" ")}
          fill="none" stroke="var(--rule)" strokeWidth={ri===2?1.5:0.75} strokeDasharray={ri===2?"none":"3,3"} />
      ))}
      {axes.map((_,i) => { const [x1,y1]=toXY(i,-5),[x2,y2]=toXY(i,5); return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--rule)" strokeWidth={0.75}/>; })}
      {models.filter(m => !highlight || m===highlight).map(m => (
        <path key={m} d={polyPath(modelPositions[m])} fill={MODEL_COLORS[m]} fillOpacity={highlight===m?0.18:0.07}
          stroke={MODEL_COLORS[m]} strokeWidth={highlight===m?1.5:0.75} strokeOpacity={highlight===m?1:0.4} />
      ))}
      {!highlight && <path d={polyPath(agg)} fill="var(--accent)" fillOpacity={0.13} stroke="var(--accent)" strokeWidth={2} />}
      {axes.map((ax,i) => {
        const lr=R+22, lx=CX+lr*Math.cos(angle(i)), ly=CY+lr*Math.sin(angle(i));
        const ta=Math.abs(Math.cos(angle(i)))<0.1?"middle":lx<CX?"end":"start";
        return <text key={i} x={lx} y={ly+4} textAnchor={ta} fontSize={9} fontFamily="DM Sans,sans-serif" fill="var(--text-secondary)" fontWeight={500} letterSpacing="0.04em" style={{textTransform:"uppercase"}}>{ax.label[lang]}</text>;
      })}
      <circle cx={CX} cy={CY} r={2.5} fill="var(--rule)" />
    </svg>
  );
}

function ModelAgreementBars({ axes, modelPositions, lang }) {

    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      {axes.map((ax,i) => {

        const mn = Math.min(...vals), mx = Math.max(...vals), sp = mx-mn;
        return (
          <div key={ax.id}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
              <span style={{ fontSize:11, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", color:"var(--text-secondary)" }}>{ax.label[lang]}</span>
              <span style={{ fontSize:11, color:sp>=2?"var(--risk-red)":"var(--text-secondary)", fontWeight:sp>=2?600:400 }}>
                {sp>=2 ? `⚡ ${lang==="fr"?"Désaccord":"Dissent"} ±${sp}` : `±${sp}`}
              </span>
            </div>
            <div style={{ position:"relative", height:24, background:"var(--bg-subtle)", borderRadius:2 }}>
              <div style={{ position:"absolute", left:"50%", top:0, bottom:0, width:1, background:"var(--rule)", opacity:0.5 }} />

                background:sp>=2?"var(--risk-red)":"var(--accent)", opacity:0.15, borderRadius:2 }} />
              {models.map(m => (
                <div key={m} title={`${m}: ${modelPositions[m][i]}`} style={{
                  position:"absolute", top:"50%", left:`${((modelPositions[m][i]+5)/10)*100}%`,

            </div>
          </div>
        );
      })}

  );
}

function RiskHeatmap({ risks, lang }) {
  const types = [
    { key:"fiscal",         label:{ fr:"Budgétaire",  en:"Fiscal" } },
    { key:"implementation", label:{ fr:"Mise en œuvre", en:"Implementation" } },
    { key:"dependency",     label:{ fr:"Dépendance",  en:"Dependency" } },
    { key:"reversal",       label:{ fr:"Réversibilité", en:"Reversal" } },
  ];
  const rc = v => ["","oklch(0.88 0.06 145)","oklch(0.82 0.10 90)","oklch(0.74 0.15 60)","oklch(0.60 0.19 30)","oklch(0.50 0.20 20)"][v]||"";
  const rl = (v,l) => ({ fr:["","Faible","Limité","Modéré","Élevé","Critique"], en:["","Low","Limited","Moderate","High","Critical"] }[l])[v]||"";
  return (
    <div style={{ overflowX:"auto" }}>
      <table style={{ borderCollapse:"collapse", width:"100%", minWidth:420 }}>
        <thead><tr>
          <th style={{ width:130, textAlign:"left", padding:"0 12px 10px 0", fontSize:10, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", color:"var(--text-secondary)" }}>{lang==="fr"?"Domaine":"Domain"}</th>
          {types.map(t => <th key={t.key} style={{ textAlign:"center", padding:"0 4px 10px", fontSize:10, fontWeight:600, letterSpacing:"0.05em", textTransform:"uppercase", color:"var(--text-secondary)" }}>{t.label[lang]}</th>)}
        </tr></thead>
        <tbody>{risks.map((row,ri) => (
          <tr key={ri}>
            <td style={{ padding:"4px 12px 4px 0", fontSize:12, fontWeight:500, color:"var(--text)", whiteSpace:"nowrap" }}>{row.dim[lang]}</td>
            {types.map(t => { const v=row[t.key]; return (
              <td key={t.key} style={{ padding:4, textAlign:"center" }}>
                <div style={{ background:rc(v), borderRadius:3, padding:"5px 4px", fontSize:10, fontWeight:600, color:v>=3?"#fff":"#333", minWidth:72 }}>{rl(v,lang)}</div>
              </td>
            );})}
          </tr>
        ))}</tbody>
      </table>
    </div>
  );
}

function IntergenerationPanel({ intergen, lang }) {
  const sc = s => s>=2?"oklch(0.44 0.17 145)":s===1?"oklch(0.60 0.12 145)":s===0?"var(--text-secondary)":s===-1?"oklch(0.60 0.13 30)":"oklch(0.46 0.19 20)";
  const bar = s => (
    <div style={{ display:"flex", alignItems:"center", gap:6, justifyContent:"center" }}>
      <div style={{ width:Math.max(Math.abs(s)*16,2), height:6, borderRadius:3, background:sc(s), opacity:s===0?0.3:1 }} />
      <span style={{ fontSize:10, fontWeight:600, color:sc(s), minWidth:16 }}>{s>0?`+${s}`:s}</span>
    </div>
  );
  return (
    <div style={{ overflowX:"auto" }}>
      <table style={{ borderCollapse:"collapse", width:"100%", minWidth:480 }}>
        <thead><tr>
          <th style={{ width:130, textAlign:"left", padding:"0 16px 12px 0", fontSize:10, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", color:"var(--text-secondary)" }}>{lang==="fr"?"Domaine":"Domain"}</th>
          {intergen.horizons.map(h => (
            <th key={h.label} style={{ textAlign:"center", padding:"0 8px 12px", fontSize:10 }}>
              <div style={{ fontWeight:700, color:"var(--text)", fontSize:11 }}>{h.label}</div>
              <div style={{ color:"var(--text-secondary)", fontSize:9, marginTop:2 }}>{h.gen[lang]}</div>
            </th>
          ))}
          <th style={{ textAlign:"left", padding:"0 0 12px 16px", fontSize:10, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", color:"var(--text-secondary)" }}>{lang==="fr"?"Note":"Note"}</th>
        </tr></thead>
        <tbody>{intergen.items.map((item,ii) => (
          <tr key={ii} style={{ borderTop:"1px solid var(--rule-light)" }}>
            <td style={{ padding:"10px 16px 10px 0", fontSize:13, fontWeight:500, color:"var(--text)", whiteSpace:"nowrap" }}>{item.dim[lang]}</td>
            {item.scores.map((s,si) => <td key={si} style={{ padding:"10px 8px", textAlign:"center" }}>{bar(s)}</td>)}
            <td style={{ padding:"10px 0 10px 16px", fontSize:11, color:"var(--text-secondary)", lineHeight:1.4, maxWidth:200 }}>{item.note[lang]}</td>
          </tr>
        ))}</tbody>
      </table>
      <div style={{ display:"flex", gap:16, marginTop:16, flexWrap:"wrap" }}>
        {[{s:3,l:lang==="fr"?"Très positif":"Very positive"},{s:1,l:lang==="fr"?"Positif":"Positive"},{s:0,l:lang==="fr"?"Neutre":"Neutral"},{s:-1,l:lang==="fr"?"Négatif":"Negative"},{s:-3,l:lang==="fr"?"Très négatif":"Very negative"}].map(({s,l}) => (
          <div key={s} style={{ display:"flex", alignItems:"center", gap:6, fontSize:10, color:"var(--text-secondary)" }}>
            <div style={{ width:Math.max(Math.abs(s)*5,2), height:5, borderRadius:2, background:sc(s) }} />{l}
          </div>
        ))}
      </div>
    </div>
  );
}

function GradeBadge({ grade, sub, size="md" }) {
  const sz = { sm:{outer:36,font:16,subFont:9}, md:{outer:56,font:26,subFont:12} }[size];
  const col = GRADE_COLOR(grade);
  return (
    <div style={{ width:sz.outer, height:sz.outer, border:`2px solid ${col}`, borderRadius:4, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, position:"relative", background:`${col}12` }}>

function ConfidencePill({ value, lang }) {
  const pct = Math.round(value*100);
  const color = pct>=75?"var(--accent)":pct>=60?"oklch(0.6 0.12 80)":"var(--risk-red)";
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
      <div style={{ width:48, height:3, background:"var(--rule-light)", borderRadius:2, overflow:"hidden" }}>
        <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:2 }} />
      </div>
      <span style={{ fontSize:10, color:"var(--text-secondary)", fontWeight:500 }}>{pct}% {lang==="fr"?"confiance":"confidence"}</span>
    </div>
  );
}

function TransparenceDrawer({ lang, open, onClose }) {
  const [activeModel, setActiveModel] = useState(C.modelsUsed[0]);
  useEffect(() => {
    const fn = e => { if (e.key==="Escape") onClose(); };
    document.addEventListener("keydown", fn);
    return () => document.removeEventListener("keydown", fn);
  }, [onClose]);
  const raw = C.rawOutputs[activeModel];

  return (
    <>
      <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", zIndex:90, opacity:open?1:0, pointerEvents:open?"auto":"none", transition:"opacity 0.25s" }} />
      <div style={{ position:"fixed", top:0, right:0, bottom:0, width:"min(560px,92vw)", background:"var(--bg)", boxShadow:"-4px 0 40px rgba(0,0,0,0.12)", zIndex:100, transform:open?"translateX(0)":"translateX(100%)", transition:"transform 0.3s cubic-bezier(0.4,0,0.2,1)", display:"flex", flexDirection:"column", overflowY:"auto" }}>
        <div style={{ padding:"24px 28px 20px", borderBottom:"1px solid var(--rule)", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, background:"var(--bg)", zIndex:1 }}>
          <div>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color:"var(--accent)", marginBottom:4 }}>{lang==="fr"?"Transparence":"Transparency"}</div>
            <div style={{ fontSize:16, fontFamily:"Cormorant Garamond,Georgia,serif", fontWeight:600, color:"var(--text)" }}>{lang==="fr"?"Sorties brutes des modèles":"Raw model outputs"}</div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", fontSize:22, color:"var(--text-secondary)", padding:4, lineHeight:1 }}>✕</button>
        </div>
        <div style={{ display:"flex", borderBottom:"1px solid var(--rule)", overflowX:"auto", flexShrink:0 }}>
          {C.modelsUsed.map(m => (
            <button key={m} onClick={() => setActiveModel(m)} style={{ padding:"10px 16px", fontSize:11, fontWeight:600, background:"none", border:"none", borderBottom:activeModel===m?`2px solid ${MODEL_COLORS[m]}`:"2px solid transparent", color:activeModel===m?"var(--text)":"var(--text-secondary)", cursor:"pointer", whiteSpace:"nowrap", transition:"color 0.15s", fontFamily:"inherit" }}>
              <span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:MODEL_COLORS[m], marginRight:6, verticalAlign:"middle" }} />{m}
            </button>
          ))}
        </div>
        {raw && (
          <div style={{ padding:"28px", flex:1, display:"flex", flexDirection:"column", gap:24 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {[
                { l:lang==="fr"?"Modèle":"Model", v:raw.model },
                { l:lang==="fr"?"SHA256 du prompt":"Prompt SHA256", v:raw.promptHash },
                { l:lang==="fr"?"Confiance auto-déclarée":"Self-declared confidence", v:`${Math.round(raw.confidence*100)}%` },
                { l:lang==="fr"?"Mode d'exécution":"Execution mode", v:"API (automatique)" },
              ].map(({ l, v }) => (
                <div key={l} style={{ background:"var(--bg-subtle)", borderRadius:4, padding:"10px 12px" }}>
                  <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-tertiary)", marginBottom:4 }}>{l}</div>
                  <div style={{ fontSize:12, fontFamily:"ui-monospace,'Cascadia Code',monospace", color:"var(--text)", wordBreak:"break-all" }}>{v}</div>
                </div>
              ))}
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-secondary)", marginBottom:12 }}>{lang==="fr"?"Synthèse du modèle":"Model summary"}</div>
              <p style={{ fontSize:13, lineHeight:1.65, color:"var(--text)", fontStyle:"italic", margin:0 }}>«&thinsp;{raw.summary[lang]}&thinsp;»</p>
            </div>
            <div style={{ padding:16, background:"var(--bg-subtle)", borderRadius:6, display:"flex", flexDirection:"column", gap:10 }}>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--text-secondary)" }}>{lang==="fr"?"Sources & méthode":"Sources & method"}</div>
              <p style={{ fontSize:12, lineHeight:1.6, color:"var(--text-secondary)", margin:0 }}>
                {lang==="fr"
                  ? `Le prompt complet (${C.sourceVersion}), les sources du programme, et la sortie JSON brute de ce modèle sont accessibles dans le dépôt public. Le hash SHA256 garantit qu'aucune instruction n'a été modifiée entre les modèles.`
                  : `The full prompt (${C.sourceVersion}), programme sources, and raw JSON output are in the public repository. The SHA256 hash guarantees no instructions were modified between models.`}
              </p>
              <a href="#" style={{ fontSize:11, color:"var(--accent)", fontWeight:600, textDecoration:"none" }}>→ {lang==="fr"?"Voir le dépôt public":"View public repository"}</a>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

        </div>
      </div>
    </header>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════

function App() {
  const [lang, setLang] = useState("fr");
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [activeSection, setActiveSection] = useState("synthese");

  // Expose to Tweaks
  window.__setLang = setLang;

  // Scrollspy
  useEffect(() => {
    const ids = ["synthese","positionnement","dimensions","intergen","risques"];
    const obs = new IntersectionObserver(entries => {
      for (const e of entries) { if (e.isIntersecting) { setActiveSection(e.target.id); break; } }
    }, { rootMargin:"-25% 0px -65% 0px" });
    ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  // Persist lang
  useEffect(() => { try { localStorage.setItem("e27-lang", lang); } catch {} }, [lang]);
  useEffect(() => { try { const l = localStorage.getItem("e27-lang"); if (l) setLang(l); } catch {} }, []);

  const handleSetLang = l => { setLang(l); };

  return (
    <>
      <NavBar lang={lang} setLang={handleSetLang} />
      <Hero lang={lang} onOpenTransparency={() => setDrawerOpen(true)} />
      <SectionNav lang={lang} active={activeSection} />
      <main style={{ maxWidth:"var(--content-max)", margin:"0 auto", padding:"0 32px 120px" }}>
        <SynthèseSection lang={lang} />
        <PositionnementSection lang={lang} />
        <DimensionsSection lang={lang} />
        <IntergenSection lang={lang} />
        <RisquesSection lang={lang} />
        <footer style={{ marginTop:48, paddingTop:32, borderTop:"1px solid var(--rule)" }}>
          <div style={{ display:"flex", flexWrap:"wrap", gap:16, justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ fontFamily:"Cormorant Garamond,Georgia,serif", fontSize:18, fontWeight:700, color:"var(--accent)", marginBottom:6 }}>é<span style={{ fontWeight:400 }}>lection</span> 2027</div>
              <p style={{ fontSize:11, color:"var(--text-tertiary)", maxWidth:380, lineHeight:1.6 }}>
                {lang==="fr"
                  ? "Analyse multi-IA des programmes présidentiels. Aucune recommandation de vote. Sources, prompts et sorties brutes publics."
                  : "Multi-AI analysis of presidential programmes. No voting recommendation. Sources, prompts and raw outputs are public."}
              </p>
            </div>
            <div style={{ display:"flex", gap:20, fontSize:11, color:"var(--text-tertiary)" }}>
              <a href="#" style={{ textDecoration:"none", color:"inherit" }}>{lang==="fr"?"Méthode":"Method"}</a>
              <a href="#" style={{ textDecoration:"none", color:"inherit" }}>{lang==="fr"?"Dépôt":"Repository"}</a>
              <a href="#" style={{ textDecoration:"none", color:"inherit" }}>{lang==="fr"?"Mentions légales":"Legal"}</a>
            </div>
          </div>
        </footer>
      </main>
      <TransparenceDrawer lang={lang} open={drawerOpen} onClose={() => setDrawerOpen(false)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
